<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

html, body {
  margin: 0;
  height: 100%;
}

#map {
  width: 100%;
  height: 100%;
}

/* MARKER */
.pulse {
  width: 14px;
  height: 14px;
  background: #ff9800;
  border-radius: 50%;
  position: relative;
}

.pulse::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 14px;
  height: 14px;
  background: rgba(255, 152, 0, 0.6);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(4); opacity: 0; }
}

/* CARD */
#card {
  position: fixed;
  left: 0;
  right: 0;
  bottom: -420px;
  height: 380px;
  background: white;
  border-radius: 24px 24px 0 0;
  box-shadow: 0 -10px 40px rgba(0,0,0,.2);
  transition: .35s;
  z-index: 9999;
  overflow: hidden;
}

#card.show {
  bottom: 0;
}

#close {
  position: absolute;
  right: 18px;
  top: 14px;
  font-size: 22px;
  cursor: pointer;
  z-index: 2;
}

#card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  background: #eee;
}

#cardBody {
  padding: 14px;
}

#name {
  font-size: 22px;
  font-weight: 700;
}

#info {
  margin-top: 6px;
  color: #555;
}

#time {
  margin-top: 6px;
  color: #ff9800;
}

.buttons {
  display: flex;
  gap: 10px;
  margin-top: 14px;
}

.buttons button {
  flex: 1;
  height: 46px;
  border: none;
  border-radius: 12px;
  font-size: 14px;
}

#meet {
  background: #ff9800;
  color: white;
}

#photos {
  background: #eee;
}

#report {
  width: 60px;
}

</style>
</head>

<body>

<div id="map"></div>

<!-- CARD -->
<div id="card">

<div id="close">✕</div>

<img id="cardImg">

<div id="cardBody">

<div id="name"></div>
<div id="info"></div>
<div id="time"></div>

<div class="buttons">

<button id="meet">🍻</button>
<button id="photos">📷</button>
<button id="report">🚨</button>

</div>

</div>

</div>

<script>

const SUPABASE_URL = "https://snmlpsaieitdtndejyeb.supabase.co"
const SUPABASE_KEY = "sb_publishable_hbePon_xWmr_4VI2PVMqOA_6mcfey2F"

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

const tg = window.Telegram?.WebApp
const myId = tg?.initDataUnsafe?.user?.id

const map = L.map("map").setView([52.52, 13.40], 12)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
maxZoom: 19
}).addTo(map)

let markers = {}

let myLat = null
let myLon = null

let currentPost = null
let currentPhotos = []

// DIST
function dist(a,b,c,d){
const R=6371
const dLat=(c-a)*Math.PI/180
const dLon=(d-b)*Math.PI/180

const x=
Math.sin(dLat/2)**2+
Math.cos(a*Math.PI/180)*
Math.cos(c*Math.PI/180)*
Math.sin(dLon/2)**2

return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))
}

// SEND TO BOT
function send(action,payload={}){
if(!myId){
alert("Открой в Telegram")
return
}
tg.sendData(JSON.stringify({action,...payload}))
}

// CARD OPEN
function openCard(p){

currentPost = p

try{
currentPhotos = JSON.parse(p.photos||"[]")
}catch{
currentPhotos=[]
}

document.getElementById("cardImg").src =
currentPhotos[0] || "https://placehold.co/600x400"

document.getElementById("name").innerText =
p.name + ", " + p.age

document.getElementById("info").innerText =
"🍺 " + p.drinks

const mins =
Math.max(
0,
Math.floor((new Date(p.expires_at)-new Date())/60000)
)

document.getElementById("time").innerText =
"⏳ " + mins + " мин"

document.getElementById("card").classList.add("show")

}

// CLOSE
document.getElementById("close").onclick=
()=>{
document.getElementById("card").classList.remove("show")
}

// BUTTONS
document.getElementById("meet").onclick=
()=>{
if(currentPost)
send("meet",{post_id:currentPost.id})
}

document.getElementById("report").onclick=
()=>{
if(currentPost)
send("report",{user_id:currentPost.user_id})
}

document.getElementById("photos").onclick=
()=>{
if(!currentPost) return
window.open(`https://t.me/drink_nearby_bot?start=post_${currentPost.id}`)
}

// GEO
navigator.geolocation?.getCurrentPosition((pos)=>{

myLat=pos.coords.latitude
myLon=pos.coords.longitude

map.setView([myLat,myLon],14)

L.circleMarker([myLat,myLon],{
radius:10,
color:"#2196f3"
}).addTo(map)

})

// LOAD POSTS
async function load(){

const {data} = await client
.from("posts")
.select("*")
.eq("active",true)

Object.values(markers).forEach(m=>map.removeLayer(m))
markers={}

data.forEach(p=>{

if(!p.lat||!p.lon) return

const marker=L.marker(
[p.lat,p.lon],
{
icon:L.divIcon({className:"pulse"})
}
)

marker.on("click",()=>openCard(p))

marker.addTo(map)

markers[p.id]=marker

})

}

load()
setInterval(load,8000)

tg?.ready()
tg?.expand()

</script>

</body>
</html>
