<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Drink Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: Arial;
}

#map {
  width: 100%;
  height: 100%;
}

/* 🔥 красивый пульс */
.pulse {
  width: 14px;
  height: 14px;
  background: #ff9800;
  border-radius: 50%;
  position: relative;
}

.pulse::after {
  content: "";
  position: absolute;
  width: 14px;
  height: 14px;
  background: rgba(255, 152, 0, 0.5);
  border-radius: 50%;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(4); opacity: 0; }
}

/* popup */
.leaflet-popup-content {
  font-size: 14px;
}
button {
  margin-top: 5px;
  width: 100%;
  padding: 6px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="map"></div>

<script>

const SUPABASE_URL = "https://snmlpsaieitdtndejyeb.supabase.co"

// ⚠️ ВПИШИ СЮДА anon key (обязательно)
const SUPABASE_ANON_KEY = "sb_publishable_hbePon_xWmr_4VI2PVMqOA_6mcfey2F"

const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

const tg = window.Telegram?.WebApp || null
const myId = tg?.initDataUnsafe?.user?.id || null

const map = L.map("map").setView([52.52, 13.40], 12)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19
}).addTo(map)

let markers = {}

let myLat = null
let myLon = null

// ---------------- DISTANCE
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;

  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  return R * c;
}

// ---------------- MY LOCATION
navigator.geolocation?.getCurrentPosition(
  (pos) => {
    myLat = pos.coords.latitude
    myLon = pos.coords.longitude

    map.setView([myLat, myLon], 13)

    L.circle([myLat, myLon], {
      radius: 300,
      color: "blue",
      fillOpacity: 0.1
    }).addTo(map)
  },
  () => {}
)

// ---------------- SEND TO BOT
function sendAction(action, payload = {}) {

  if (!myId) {
    alert("Открой в Telegram")
    return
  }

  tg.sendData(JSON.stringify({
    action,
    ...payload
  }))
}

function meetUser(postId) {
  sendAction("meet", { post_id: postId })
}

function reportUser(userId) {
  sendAction("report", { user_id: userId })
}

// ---------------- LOAD POSTS
async function loadPosts() {

  const { data, error } = await client
    .from("posts")
    .select("*")
    .eq("active", true)

  if (error) {
    console.error(error)
    return
  }

  // remove old markers
  Object.values(markers).forEach(m => map.removeLayer(m))
  markers = {}

  data.forEach(p => {

    if (!p.lat || !p.lon) return

    const icon = L.divIcon({
      className: "pulse"
    })

    const marker = L.marker([p.lat, p.lon], { icon })

    let distanceText = "..."

    if (myLat && myLon) {
      distanceText = getDistance(myLat, myLon, p.lat, p.lon).toFixed(1) + " км"
    }

    const popupHTML = `
      <div style="min-width:180px">

        <b>${p.name}</b><br/>
        🎂 ${p.age} лет<br/>
        🍺 ${p.drinks}<br/>
        📍 ${distanceText}

        <hr/>

        <button onclick="window.open('https://t.me/drink_nearby_bot?start=post_${p.id}')">
          👤 Открыть анкету
        </button>

        <button onclick="meetUser(${p.id})">
          🍻 Встретиться
        </button>

        <button onclick="reportUser(${p.user_id})">
          🚨 Жалоба
        </button>

      </div>
    `

    marker.bindPopup(popupHTML)

    marker.addTo(map)
    markers[p.id] = marker
  })
}

// ---------------- AUTO REFRESH
loadPosts()
setInterval(loadPosts, 8000)

// ---------------- TELEGRAM READY
tg?.ready()
tg?.expand()

navigator.geolocation?.getCurrentPosition((pos) => {

  const R = 6371;

  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

function sendAction(action, payload = {}) {

  tg.sendData(JSON.stringify({ action, ...payload }))
}

function meetUser(postId) {
  sendAction("meet", { post_id: postId })
}

function reportUser(userId) {
  sendAction("report", { user_id: userId })
}

async function loadPosts() {

  const { data, error } = await client
    .from("posts")
    .select("*")
    .eq("active", true)

  if (error) {
    console.error(error)
    return
  }

  Object.values(markers).forEach(m => map.removeLayer(m))
  markers = {}

  data.forEach(p => {

    if (!p.lat || !p.lon) return

    const icon = L.divIcon({ className: "pulse" })
    const marker = L.marker([p.lat, p.lon], { icon })

    const dist = (myLat && myLon)
      ? getDistance(myLat, myLon, p.lat, p.lon).toFixed(1) + " км"
      : "..."

    const popup = `
      <div style="min-width:200px">

        <b>${p.name}</b><br/>
        🎂 ${p.age}<br/>
        🍺 ${p.drinks}<br/>
        📍 ${dist}

        <hr/>

        <button onclick="window.open('https://t.me/drink_nearby_bot?start=post_${p.id}')">
          👤 Открыть
        </button>

        <button onclick="meetUser(${p.id})">
          🍻 Встретиться
        </button>

        <button onclick="reportUser(${p.user_id})">
          🚨 Жалоба
        </button>

      </div>
    `

    marker.bindPopup(popup)
    marker.addTo(map)

    markers[p.id] = marker
  })

  document.getElementById("loader").style.display = "none"
}

loadPosts()
setInterval(loadPosts, 8000)

tg?.ready()
tg?.expand()

</script>
</body>
</html>
